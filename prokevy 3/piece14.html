<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piece 14 - Kai Layton Art</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const prevLink = document.querySelector('.nav-arrow.nav-left');
      const nextLink = document.querySelector('.nav-arrow.nav-right');
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft' && prevLink) {
          window.location.href = prevLink.href;
        } else if (e.key === 'ArrowRight' && nextLink) {
          window.location.href = nextLink.href;
        }
      });
    });
  </script>
</head>
<body>
  <div class="page-shell piece-detail-page">
    <header class="hero-header">
      <div class="hero-top">
        <a class="top-button icon-art" href="index.html#gallery"><img src="images/nav bar/art button.png" alt="Gallery" /></a>
        <a class="top-button icon-home" href="index.html"><img src="images/nav bar/home button.png" alt="Home" /></a>
        <a class="top-button icon-help" href="index.html#faq"><img src="images/nav bar/FAQ.png" alt="FAQ" /></a>
<div class="hero-links">
  <a class="top-button icon-contact" href="contact.html"><img src="phone_for_contact_page.png" alt="Contact"></a>
  <a class="top-button icon-about" href="about.html"><img src="about_me_button.png" alt="About"></a>
</div>      </div>
    </header>

    <section class="piece-detail">
      <div class="piece-image"><img src="images/artwork/Kai-Layton-Project-2-Poster-Final.png" alt="Piece 14" onclick="openModal(this.src)"></div>
      <h1 class="piece-detail-title">Piece 14</h1>
      <div class="piece-description">
        <h2 class="description-title">Description</h2>
        <p class="description-body"> Add  artwork 14 description here.</p>
      </div>
      <a class="piece-back" href="index.html">Back to gallery</a>
          
</section>
    <div class="piece-nav">
        <a class="nav-arrow nav-left" href="piece13.html" aria-label="Previous piece">&#8592;</a>
        <a class="nav-arrow nav-right" href="piece15.html" aria-label="Next piece">&#8594;</a>
      </div>
    <footer class="site-footer">
      <div class="footer-overlay">
        <div class="footer-title">Kai Layton</div>
        <div class="footer-subtitle">Thank you for visiting!</div>
      </div>
    </footer>
  </div>

  <!-- Image Modal -->
  <div id="imageModal" class="image-modal">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <img class="modal-image" id="modalImage" src="">
  </div>

  <script>
    function openModal(src) {
      const modal = document.getElementById("imageModal");
      const modalImage = document.getElementById("modalImage");
      modalImage.src = src;
      modal.style.display = "flex";
      document.body.style.overflow = "hidden";
    }
    
    function closeModal() {
      const modal = document.getElementById("imageModal");
      modal.style.display = "none";
      document.body.style.overflow = "auto";
    }
    
    document.getElementById("imageModal").addEventListener("click", function(event) {
      if (event.target === this) {
        closeModal();
      }
    });
    
    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeModal();
      }
    });
  </script>
</body>
</html>
